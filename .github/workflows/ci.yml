name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # ── Ubuntu ──────────────────────────────────────────────────────────────────
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bbfx-revival
        uses: actions/checkout@v4
        with:
          path: bbfx-revival

      - name: Checkout ogre-lua
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ogre-lua
          path: ogre-lua

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "ff8f729804f07747ee5dae7d40a4a885066f9204"

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool libgl-dev libglu1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev

      - name: Configure
        run: cmake --preset linux-release
        working-directory: bbfx-revival

      - name: Build
        run: cmake --build --preset linux-release
        working-directory: bbfx-revival

      - name: Test
        run: ctest --preset linux-release --output-on-failure
        working-directory: bbfx-revival

  # ── Windows ─────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout bbfx-revival
        uses: actions/checkout@v4
        with:
          path: bbfx-revival

      - name: Checkout ogre-lua
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ogre-lua
          path: ogre-lua

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "ff8f729804f07747ee5dae7d40a4a885066f9204"

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure
        run: cmake --preset windows-release
        working-directory: bbfx-revival

      - name: Build
        run: cmake --build --preset windows-release
        working-directory: bbfx-revival

      - name: Test
        run: ctest --preset windows-release --output-on-failure
        working-directory: bbfx-revival
